{% extends "admin/change_list.html" %}
{% load i18n unfold_list %}

{% block result_list %}
    {% include "unfold/helpers/change_list_actions.html" %}
    {% unfold_result_list cl %}

    {% if action_form and has_delete_permission %}
        <div
            id="bulk-delete-dock"
            class="bulk-delete-dock hidden items-center gap-4"
            role="region"
            aria-label="{% translate 'Bulk delete' %}"
        >
            <span
                class="action-counter text-sm text-base-500 dark:text-base-400"
                data-actions-icnt="{{ cl.result_list|length }}"
            >
                {% translate "0 of 0 selected" %}
            </span>
            <button
                type="button"
                class="bulk-delete-btn text-sm font-semibold"
            >
                {% translate "Delete" %}
            </button>
        </div>
    {% endif %}
{% endblock %}
